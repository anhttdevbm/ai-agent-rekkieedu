##
# Nginx reverse proxy for Agent Edu
# Domain: rikkei.rugal.vn
#
# Notes:
# - This config expects TLS certs to exist at:
#   /etc/letsencrypt/live/rikkei.rugal.vn/fullchain.pem
#   /etc/letsencrypt/live/rikkei.rugal.vn/privkey.pem
# - If you only want HTTP (no TLS), comment out the 443 server block
#   and keep the 80 server block without redirect.
##

upstream agent_edu_upstream {
  server web:8765;
  keepalive 32;
}

server {
  listen 80;
  server_name rikkei.rugal.vn;


  # Uncomment if you terminate TLS here (recommended)
  return 301 https://$host$request_uri;

  # If you want HTTP only, replace the redirect with:
  # location / {
  #   proxy_pass http://agent_edu_upstream;
  #   proxy_http_version 1.1;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }
}

server {
  listen 443 ssl;
  http2 on;
  server_name rikkei.rugal.vn;

  ssl_certificate     /etc/letsencrypt/live/rikkei.rugal.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/rikkei.rugal.vn/privkey.pem;

  # Sensible defaults
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Security headers (safe defaults)
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  # Upload size (DOCX / XLSX / ZIP). Adjust if needed.
  client_max_body_size 50m;

  location / {
    proxy_pass http://agent_edu_upstream;
    proxy_http_version 1.1;

    # Preserve host + real IP
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for long AI calls
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;
  }
}

