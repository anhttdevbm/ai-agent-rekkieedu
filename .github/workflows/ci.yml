name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No external deps needed for this check (fast + reliable)
      - name: Python compile
        run: |
          python -m py_compile cham_bai/*.py
          python -m py_compile cham_bai/web/static/*.js || true

  docker-build-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: false
          tags: agent-edu:ci

