name: CD - Build & Deploy (prod)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: agent-edu-prod
  cancel-in-progress: false

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-edu
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (Dockerfile.prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_ssh:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          AGENT_EDU_IMAGE: ghcr.io/${{ github.repository_owner }}/agent-edu
          AGENT_EDU_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: GHCR_USERNAME,GHCR_TOKEN,AGENT_EDU_IMAGE,AGENT_EDU_TAG
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            # Pull latest code from main (nginx config/compose/scripts)
            if [ -d .git ]; then
              git fetch --all --prune
              git reset --hard origin/main
            fi

            # Ensure env file exists
            test -f .env

            # Login to GHCR on the server (required for private repos)
            if [ -n "${GHCR_TOKEN:-}" ] && [ -n "${GHCR_USERNAME:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            export AGENT_EDU_IMAGE AGENT_EDU_TAG

            docker compose -f docker-compose.prod.yml --env-file .env pull web
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            # Basic health probe (web published to localhost)
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8765/api/meta >/dev/null 2>&1; then
                echo "OK: /api/meta is healthy"
                exit 0
              fi
              sleep 2
            done
            echo "ERROR: /api/meta did not become healthy" >&2
            docker compose -f docker-compose.prod.yml --env-file .env ps >&2 || true
            docker compose -f docker-compose.prod.yml --env-file .env logs --tail=200 web >&2 || true
            exit 1

