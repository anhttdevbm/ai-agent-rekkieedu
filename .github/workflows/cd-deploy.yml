name: CD - Build & Deploy (prod)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: agent-edu-prod
  cancel-in-progress: false

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-edu
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (Dockerfile.prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_ssh:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            # Optional: update repo if it's a git checkout
            if [ -d .git ]; then
              git fetch --all --prune
              git reset --hard origin/main
            fi

            # Ensure env file exists
            test -f .env

            # Use the freshly pushed image (compose still has build; this forces image tag)
            export AGENT_EDU_IMAGE="ghcr.io/${{ github.repository_owner }}/agent-edu"
            export AGENT_EDU_TAG="${{ github.sha }}"

            docker compose -f docker-compose.prod.yml --env-file .env pull || true
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build

            # Basic health probe via nginx
            curl -fsS http://127.0.0.1/api/meta >/dev/null

